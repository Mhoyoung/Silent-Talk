# 데이터/전처리 설정 (1차 MVP)
# ROI/FPS/PADDING 등 불변 기준값은 backend/config.py 가 단일 진실 공급원.
# 여기에는 학습 manifest 경로와 1차 MVP 범위 제한만 둔다.
dataset:
  name: aihub_lipreading_subset
  manifest_train: data_cache/manifest_train.jsonl
  manifest_val: data_cache/manifest_val.jsonl
  manifest_test: data_cache/manifest_test.jsonl

  # 1차 MVP 범위 제한
  max_speakers: null            # null 이면 manifest 전체 사용
  vocabulary_size: 100          # 핵심 어휘 수
  sentence_pool: 50             # 지정 문장 수

preprocess:
  # out_size, padding_ratio, fps 는 backend/config.py 의 ROI_SIZE/ROI_MARGIN/FPS 사용
  max_frames: 75                # = SEQ_LEN
  min_frames: 8

vvad:
  window: 5
  mar_threshold: 0.04
  min_speech_frames: 6
  min_silence_frames: 4

dataloader:
  batch_size: 16
  num_workers: 4
  shuffle: true
  pin_memory: true
